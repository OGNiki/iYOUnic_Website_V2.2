name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Runs every time you push to main
  workflow_dispatch:   # Allows you to run it manually

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Remove the 'cache: npm' line or comment it out
          # cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          # This matches the variables in your vite.config.js
          BASE_PATH: "/" 
          PORT: 5173

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # This matches the 'outDir' in your vite.config.js
          path: dist

  deploy_site:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
