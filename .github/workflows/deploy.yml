name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Runs every time you push to main
  workflow_dispatch:   # Allows you to run it manually

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # Matches modern pnpm versions

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build
        env:
          # This ensures the site works at iyounic.com/
          BASE_PATH: "/" 
          PORT: 5173

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # This must match your 'outDir' in vite.config.js
          path: dist

  deploy_site:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
